version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neural-tutor-postgres
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipassword
      POSTGRES_DB: my_first_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiuser']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neural-network

  redis:
    image: redis:7-alpine
    container_name: neural-tutor-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neural-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neural-tutor-backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://aiuser:aipassword@postgres:5432/my_first_ai
      REDIS_URL: redis://redis:6379
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - neural-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neural-tutor-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://backend:3001}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    networks:
      - neural-network

  nginx:
    image: nginx:alpine
    container_name: neural-tutor-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - neural-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  neural-network:
    driver: bridge
